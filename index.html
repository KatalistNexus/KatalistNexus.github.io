    <title>KATALİST Nexus | Eskişehir</title>
    <style>
        :root { --bg-primary: #d6d6d6; --bg-secondary: #f5f5dc; --text-color: #1a1a1a; --nav-bg: #c0c0c0; --gear-color: #1a1a1a; --accent: #555; }
        [data-theme="dark"] { --bg-primary: #0a192f; --bg-secondary: #b8860b; --text-color: #f0f0f0; --nav-bg: #020c1b; --gear-color: #d4af37; --accent: #ffcc00; }
        [data-theme="nature"] { --bg-primary: #1e2b22; --bg-secondary: #4a3728; --text-color: #e8e6d9; --nav-bg: #141e17; --gear-color: #2e3b32; --accent: #8f9779; }

        body { font-family: 'Roboto', sans-serif; line-height: 1.8; color: var(--text-color); background-color: var(--bg-primary); margin: 0; transition: background 0.5s, color 0.5s; overflow-x: hidden; }
        h1, h2, h3 { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        h1 { font-size: 3.5em; margin: 0; }
        h2 { border-bottom: 2px solid var(--text-color); padding-bottom: 15px; font-size: 2.5em; margin-top: 0; }
        p { font-size: 1.15em; text-align: justify; margin-bottom: 25px; }

        .section { padding: 100px 20px; margin: 0; position: relative; z-index: 10; }
        .section:nth-child(odd) { background-color: var(--bg-primary); }
        .section:nth-child(even) { background-color: var(--bg-secondary); }
        [data-theme="dark"] .section:nth-child(even) { color: #1a1a1a; }
        [data-theme="dark"] .section:nth-child(even) h1, [data-theme="dark"] .section:nth-child(even) h2 { border-color: #1a1a1a; }
        .content-box { max-width: 1000px; margin: 0 auto; }

        nav { background: var(--nav-bg); padding: 15px 30px; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.5s; }
        .nav-logo { font-family: 'Oswald', sans-serif; font-weight: 700; letter-spacing: 5px; font-size: 1.6em; flex-grow: 1; text-align: center; }
        .menu-icon { font-size: 32px; cursor: pointer; color: var(--text-color); }
        .main-logo { max-width: 250px; display: block; margin: 0 auto 30px auto; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.4)); }

        .switch-container { display: flex; flex-direction: column; align-items: center; width: 40px; }
        .switch-label { font-size: 9px; font-weight: bold; margin-bottom: 3px; }
        .switch { position: relative; width: 24px; height: 50px; background-color: rgba(0,0,0,0.3); border-radius: 12px; cursor: pointer; border: 2px solid var(--text-color); transition:0.4s;}
        .switch::before { content: ""; position: absolute; width: 18px; height: 18px; border-radius: 50%; background-color: var(--text-color); bottom: 3px; left: 3px; transition: 0.4s; }
        [data-theme="dark"] .switch::before { transform: translateY(-26px); background-color: var(--accent); }

        .sidebar { position: fixed; top: 0; right: -350px; width: 300px; height: 100vh; background: var(--bg-secondary); box-shadow: -10px 0 30px rgba(0,0,0,0.5); z-index: 1000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 40px 30px; display: flex; flex-direction: column; gap: 15px; border-left: 3px solid var(--text-color); overflow-y: auto;}
        [data-theme="dark"] .sidebar { color: #1a1a1a; }
        .sidebar.active { right: 0; }
        .close-btn { align-self: flex-end; font-size: 30px; cursor: pointer; font-weight:bold; }
        .sidebar a, .sidebar button { font-family: 'Oswald', sans-serif; text-transform: uppercase; text-decoration: none; color: inherit; font-size: 1.1em; font-weight: 500; border-bottom: 1px solid rgba(0,0,0,0.2); padding: 15px 0; background: none; border-top:none; border-left:none; border-right:none; text-align: left; cursor: pointer; transition: 0.3s; }
        .sidebar a:hover { padding-left: 10px; color: var(--accent); }
        .highlight-btn { background: var(--text-color) !important; color: var(--bg-primary) !important; padding: 15px; text-align: center !important; border-radius: 8px; margin-bottom: 10px; display:block; text-decoration:none; font-weight:bold;}
        .sidebar-contact-header { font-family: 'Oswald', sans-serif; font-size: 1.3em; font-weight: 700; margin-top: 20px; border-bottom: 2px solid; padding-bottom: 10px; color: inherit;}

        .library-btn { display: inline-block; background: var(--text-color); color: var(--bg-secondary); padding: 20px 40px; font-family: 'Oswald', sans-serif; font-size: 1.4em; text-decoration: none; border-radius: 10px; margin-top: 30px; transition: 0.3s; letter-spacing: 2px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .library-btn:hover { transform: scale(1.05); background: var(--accent); color: #fff; }

        .bg-gears { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 0; overflow: hidden; opacity: 0.15; }
        .gear { position: absolute; fill: var(--gear-color); transition: transform 0.1s linear; }
        .gear-lg { width: 550px; height: 550px; } .gear-md { width: 350px; height: 350px; } .gear-sm { width: 200px; height: 200px; }
        #bg-gear1 { top: -100px; left: -100px; } #bg-gear2 { top: 220px; left: 300px; } #bg-gear3 { top: -50px; left: 650px; } #bg-gear4 { top: 450px; left: -80px; } #bg-gear5 { top: 650px; left: 220px; } #bg-gear6 { top: 550px; left: 580px; } #bg-gear7 { top: 120px; right: -100px; } #bg-gear8 { bottom: -120px; left: -120px; } #bg-gear9 { bottom: 180px; left: 280px; } #bg-gear10 { bottom: -60px; left: 550px; } #bg-gear11 { bottom: 220px; right: 120px; } #bg-gear12 { top: 380px; left: 850px; } #bg-gear13 { bottom: 450px; left: 120px; } #bg-gear14 { top: 80px; left: 220px; } #bg-gear15 { bottom: 80px; right: -60px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; display: none; justify-content: center; align-items: center; }
        .modal { background: var(--card-bg); padding: 40px; border-radius: 15px; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; color: var(--text-color); border: 2px solid var(--text-color); }
        [data-theme="dark"] .modal { color: #1a1a1a; }
        .modal button { background: #1a1a1a; color: #fff; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size:1.1em; font-family: 'Oswald', sans-serif;}

        footer { padding: 60px 20px; background: var(--nav-bg); color: var(--text-color); position: relative; z-index: 10; border-top: 3px solid var(--text-color); display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .footer-about { max-width: 600px; text-align: center; }
        .footer-about h4 { font-family: 'Oswald', sans-serif; font-size: 1.5em; margin: 0 0 10px 0; letter-spacing: 2px;}
        .footer-about p { font-size: 1.1em; text-align: center; margin: 0; opacity: 0.9; font-family: 'Roboto', sans-serif;}
        
        .location { font-family: 'Oswald', sans-serif; font-size: 1.2em; letter-spacing: 2px; opacity: 0.9; margin: 20px 0; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .location svg { width: 24px; fill: var(--text-color); }
        
        .privacy-btn { background: transparent; border: 1px solid var(--text-color); color: var(--text-color); padding: 10px 20px; font-family: 'Oswald', sans-serif; font-size: 1em; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .privacy-btn:hover { background: var(--text-color); color: var(--nav-bg); }

        #backToTop { position: fixed; bottom: 40px; right: 40px; width: 60px; height: 60px; background: transparent; border: none; cursor: pointer; z-index: 101; display: none; }
        #backToTop svg { width: 100%; height: 100%; fill: var(--text-color); filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); transition: 0.3s; }
        #backToTop:hover svg { transform: rotate(90deg); }
        .contact-float { position: fixed; bottom: 40px; left: 40px; background: var(--text-color); color: var(--bg-primary); padding: 15px 25px; border-radius: 30px; font-family: 'Oswald', sans-serif; text-decoration: none; z-index: 101; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-size: 1.1em; transition: 0.3s; letter-spacing: 1px;}
        .contact-float:hover { transform: translateY(-5px); }
    </style>
</head>
